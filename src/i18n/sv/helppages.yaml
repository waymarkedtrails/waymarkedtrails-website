about:
  title: Om kartan
  hiking: Denna karta visar märkta vandringsrutter runt om i världen.
  cycling: Denna karta visar märkta cykelrutter runt om i världen.
  mtb: Denna karta visar märkta mountainbike-rutter runt om i världen.
  skating: Denna karta visar märkta inline-skridskorutter runt om i världen.
  riding: Denna karta visar uppmärkta ridningsrutter runt om i världen.
  slopemap: Denna karta visar uppmärkta vintersportbackar runt om i världen.
  osm: Lederna är överlagrade på OpenStreetMaps standardkarta och har ett valbart
    höjdskuggslager. Ledkartan skapas från data från projektet [OpenStreetMap](https://www.openstreetmap.org)
    (OSM). OSM är en fri redigerbar världskarta som alla kan bidra till. Detta innebär
    att den på intet sätt är fullständig, men det innebär också att du kan bidra genom
    att lägga till nya leder och korrigera fel som gjorts på de inlagda. För mer information
    om OpenStreetMap, se [Nybörjarguiden](https://wiki.openstreetmap.org/wiki/Beginners%27_Guide).
rendering:
  title: Renderar OSM-data
  hikingroutes: "Vandringsleder i OSM måste läggas in som relationer. Hur detta görs
    beskrivs i detalj på taggningssidan om [vandringsleder](https://wiki.openstreetmap.org/wiki/Walking_Routes)
    på OSM:s wiki. Denna karta visar relationer som har minst en av följande taggar:
    \n\ntype = route|superroute\nroute = foot|walking|hiking"
  cyclingroutes: |-
    Cykelleder i OSM måste läggas in som relationer. Hur denna görs beskrivs i detalj på taggningssidan om [cykelleder](https://wiki.openstreetmap.org/wiki/Cycle_routes) på OSM:s wiki. Denna karta visar alla relationer som har minst en av följande taggar:

    type = route|superroute
    route = bicycle

    Mountainbikeleder visas på en separat [MTB-karta](https://mtb.waymarkedtrails.org).
  mtbroutes: |-
    Mountainbikeleder följer samma taggningsschema som cykelleder vilka beskrivs i detalj på OSM-wikins sida om [cykelleder](https://wiki.openstreetmap.org/wiki/Cycle_routes). Relationer som har följande taggar är MTB-leder:

    type = route|superroute
    route = mtb

    Vanliga cykelleder visas på [cykelkartan](https://cycling.waymarkedtrails.org).
  skatingroutes: |-
    Skyltade skridskoleder kan taggas som andra leders relationer. För taggningen som används på denna karta kan du ta en titt på wikisidan om [Schweiziska inlineleder](https://wiki.openstreetmap.org/wiki/Switzerland/InlineNetwork). För att vara en skridskoled måste följande taggar finnas:

    type = route|superroute
    route = inline_skates
  ridingroutes: |-
    Skyltade hästridningsrutter kan taggas som andra leders relationer.
    För detaljer se [ruttsidan på OSM wiki](https://wiki.openstreetmap.org/wiki/Relation:route).
    För att vara en hästridningsrutt måste följande taggar finnas:

        type = route|superroute
        route = horse
  sloperoutes: |-
    Skyltade backar är vägar med piste:type-taggarna.
    För att vara en backe måste följande taggar finnas:

        piste:type = downhill|nordic|sled|hike|sleigh

    För relationer måste följande taggar finnas:

        type = route|superroute
        route = ski|piste
        piste:type = downhill|nordic|sled|hike|sleigh
  slopeclassification: |-
    Klassificeringen av skidbackar (nedförsbacke)
    bestäms genom `piste:difficulty`-taggen och
    användes för färgen i renderingen.
  classification: |-
    En `route`-tagg med flera värden stöds om de är separerade av semikolon utan omgivande mellanslag.
    Klassificeringen (och därigenom ledens färg på kartan) bestäms genom `network`-taggen.
  slopemaplabels: |-
    Etiketten för skidrutter (nedförsbacke) "gissas fram" utifrån taggarna i följande ordning:

    1. Om taggen `piste:ref` existerar, skapa en textruta med taggen `piste:ref`.
    2. Om taggen `piste:name` existerar, skapa en referens utifrån denna i första hand genom att använda versala bokstäver och om detta misslyckas genom att använda de första tecknen i namnet.
    3. Om taggen `ref` existerar, skapa en textruta med taggen `ref`.
    4. Om det är en relation och taggen `name` existerar, skapa en referens utifrån denna i första hand genom att använda versala bokstäver och om detta misslyckas genom att använda de första tecknen i namnet.
    5. Ge upp.

    Nordiska backar markeras med en skylt för att visa sin färg om en färgtagg används.
  hikinglabels: |-
    Etiketten för varje led "gissas fram" utifrån taggarna i följande ordning:

    1. Kolla efter [lokala renderingsregler](#help-hikinglocal).
    2. Försök översätta taggen `osmc:symbol`. För detaljer om vilka delar som förstås, se [Renderingsregler för osmc:symbol](osmc_symbols.html). 3. Om taggen `ref` existerar, gör en textruta med taggen `ref`.
    4. Om taggen `name` existerar, skapa en referens utifrån denna i första hand genom att använda versala bokstäver och om detta misslyckas genom att använda de första tecknen i namnet.
    5. Ge upp.
  labels: |-
    Etiketten för varje led "gissas fram" utifrån taggarna i följande ordning:

    1. Om taggen `ref` existerar, gör en textetikett med `ref` i.
    2. Om taggen `name` existerar, skapa en referens utifrån denna, i första hand genom att använda versala bokstäver och om detta misslyckas genom att använda de första tecknen i namnet.
    3. Ge upp.
  hierarchy: Kartan stödjer även [relationhierarkier](#help-hierarchies).
  guideposts: "[Guideposts](https://wiki.openstreetmap.org/wiki/Tag:information%3Dguidepost)
    känns igen genom följande taggar: \n\ntourism=information\ninformation=guidepost\nname=<name>\nele=<altitude>
    \n\n`tourism` och `information` måste finnas. `name` och `ele` kan utelämnas."
route_order:
  title: Ordning av rutter
  text: |-
    waymarkedtrails behöver korrekt sorterade rutter för att visa
    höjdprofilen och för GPX- och KML-nedladdningar. När en rutt analyseras försöker
    den respektera ordningen på medlemsvägarna inom
    relationen så mycket som möjligt eftersom det gör det enklast för kartläggare att påverka
    ordningen utan att behöva tillgripa trial and error. Om en relation
    verkar vara osorterad, kommer waymarkedtrails fortfarande att placera
    vägarna i en ordning om och bara om vägarna kan bilda en obruten
    linjär rutt.

    Relationsroller beaktas vid sortering av rutten.
    `framåt`- och `bakåt`-rollerna kan användas för att markera avsnitt där
    rutten ska följas på olika delar beroende på
    riktningen. Kom ihåg att dessa roller definieras i förhållande till vägens
    riktning, inte rutten! Om du har en sådan delad sektion,
    se till att vägarna för varje riktning visas direkt efter
    varannan i relationen och att vägarna fortfarande följer
    ruttens!ordning.

    Alla andra roller betraktas som sidovägar av en eller annan form och
    ignoreras för den allmänna sorteringen av rutten. De visas fortfarande på
    kartan.

    Waymarkedtrails kan hantera odelade rondeller inom en
    rutt. Lägg bara till den avstängda vägen utan någon roll så delas rondellen
    internt upp i lämpliga sektioner. Detta fungerar även
    när det finns en V-formad infart till rondellen som är uppdelad i
    framåt och
    bakåt. Det finns två fall där denna hantering misslyckas:

    * om rondellen av någon anledning delades upp på flera sätt,
     då _måste_ du lägga till delarna med lämpliga `framåt`- och
     `bakåt`-roller.
    * om rondellen är en del av en riktningssektion måste du
     dela upp rondellen och lägg till den använda delen med lämplig
    -roll.

    Allmän tumregel för ordning: om JOSM-relationsredigeraren
    visar rutten som kontinuerlig, då borde waymakedtrails också kunna
    visa en linjär rutt.
hierarchies:
  title: Relationhierarkier
  text: |-
    Kartan stöder även kapslade relationer, dvs. relationer som själva innehåller
    relationer. Dessa hierarkier används på två olika sätt
    i OSM-databasen: de används antingen för att dela upp mycket långa rutter
    (t.ex. [E1](https://hiking.waymarkedtrails.org/#route?id=36367)) eller så används de
    för att undvika dubbelarbete där två rutter går längs samma väg (se
    till exempel den schweiziska [ViaFrancigena](https://hiking.waymarkedtrails.org/#route?id=124582)
    som är en del av den europeiska [Via Francigena](https://hiking.waymarkedtrails.org/#route?id=11860709)).
    I det första fallet är delrelationerna inte kompletta rutter
    i sig själva och bör därför inte visas oberoende av varandra på kartan.

    Hur exakt en delrelation behandlas av renderaren beror på
    `network`-taggen:

    * Om förälder- och barnrelationen delar samma nätverkstagg, tas barn
    -relationen som bara ett steg i förälderrelationen. Således, läggs
     dess rutt till förälderrelationen, och barnrelationen visas
     inte i kartan.
    * Om nätverkstaggarna för förälder- och barnrelationen är olika, antas
    -relationen vara oberoende. Rutten för barnrelationen
     läggs till föräldern och båda relationerna visas i kartan.

    *Obs:* Du kan alltid inspektera delrelationer via ruttläsaren. Välj helt enkelt förälderrelationen så visas en valbar lista över dess delrelationer.
osmc:
  title: osmc:symbol-taggen
  text: "Taggen `osmc:symbol` ger ett sätt att beskriva ruttmarkörer på\nett maskinläsbart
    sätt. Den är huvudsakligen avsedd för symboler som\nbestår av enkla geometriska
    former. För en fullständig beskrivning och historik för taggen, besök \n[osmc:symbol-sidan](https://wiki.openstreetmap.org/wiki/Key:osmc:symbol)\npå
    OSM-wikin. Waymarkedtrails följer i stort sett syntaxen som beskrivs\npå wikisidan
    med vissa begränsningar och utökningar som beskrivs här.\n\nFör att renderas på
    kartan måste taggen ha ett av följande format:\n\nwaycolor:background\nwaycolor:background:foreground\nwaycolor:background:foreground:foreground2\nwaycolor:background:foreground:foreground2:text:textcolor\nwaycolor:background:foreground:text:textcolor\n\n`Waycolor`
    måste alltid finnas men ignoreras för denna karta.\nDessutom måste du ange en
    bakgrund, även om du kan lämna\nfältet tomt. Följ sedan maximalt två olika förgrunder.\nTill
    sist kan du valfritt lägga till en liten referenstext som ska läggas till\növerst.
    Textens färg måste alltid anges. Observera att\nwaymarkedtrails ignorerar referenstexter
    när de blir för långa.\nHur lång texten kan vara beror på de valda bakgrunderna:\nden
    hårda gränsen är 4 tecken, diamantformade bakgrunder tar bara\nett enda tecken,
    randiga och stapelformade bakgrunder tar ingen\nreferenstext alls."
  reference_footer: Den fullständiga listan över färger och former som waymarkedtrails
    spår kan visa upp finns i referenserna nedan.
  footer: Se den extra [osmc:symbol](osmc_symbols.html) taggsidan för en lista över
    symboler som stöds av Waymarked Trails.
hikinglocal:
  title: Lokaliserade rendering
  text: "Det finns en mängd olika system att markera vandringsleder runt om i världen.
    Även om kartan försöker att använda de vanligaste taggarna för att ge dem en anständig
    rendering, kommer det att misslyckas för vissa system, särskilt för nätverk av
    vandringsleder. För att tillgodose dessa system kan kartan lokaliseras för regioner
    där standardrendering är otillräcklig. \n\nNedan är en lista över regioner som
    använder särskilda kartsymboler. Läs tipsen i slutet av sidan för att få din egen
    region återged på ett speciellt sätt."
  swiss: |-
    ## Schweiz

    Schweiz har ett omfattande nätverk av markerade vandringsleder som täcker hela landet. Nätverket är ett  punktnätverk där namngivna vägvisningsskyltar fungerar som punkter. Alla leder är markerade konsekvent enligt deras svårighetsgrad. Kartan visar dessa leder i rött med linjemönstret som markerar svårighetsgraden.

    * ![röd linje](route_std.png) *vandringsled*, markerad med ![diamant](yellow_diamond.svg). Taggad med `network=lwn` och `osmc:symbol=yellow:[...]:yellow_diamond`.
    * ![streckad linje](route_mnt.png) *bergsled*, markerad med ![vit-röd-vit](white_red_bar.svg). Taggad med `network=lwn` och `osmc:symbol=red:white:red_bar`.
    * ![prickad linje](route_alp.png) *alpinled*, markerad med ![vit-blå-vit](white_blue_bar.svg). Taggad med `network=lwn` och `osmc:symbol=blue:white:blue_bar`.

    Notera att utöver detta nätverk finns det ett antal nationella och regionala rutter som visas på vanligt sätt.

    För mer information om att tagga vandringsleder i Schweiz i OSM se: [Schweiz vandringsnätverk](https://wiki.openstreetmap.org/wiki/Switzerland/HikingNetwork).
  austria: |-
    ## Österrike

    Regionen Vorarlberg använder ett liknade system som Schweiz. Rutter med taggarna `operator=Land Vorarlberg`, `network=rwn`
    och `network:type=basic_network` kommer markeras med ett svårighetsbaserat schema:

    * ![röd linje](route_std.png) osmc:symbol=yellow:white:yellow_upper
    * ![streckad linje](route_mnt.png) osmc:symbol=red:white:red_bar
    * ![prickad linje](route_alp.png) osmc:symbol=blue:white:blue_bar
  italy: |-
    ## Italien

    Italienska Alpinklubben (CAI) underhåller nätverket av bergsleder som är klassificerade liknade det som finns i Schweiz.
    Rutter markerade med `network=lwn`, `osmc:symbol=red:..` och en `cai_scale`-tagg kommer att identifieras som CAI-underhållna leder och visas som röda linjer enligt deras svårighetsgrad.

    * ![röd linje](route_std.png) cai_scale=T
    * ![streckad linje](route_mnt1.png) cai_scale=E
    * ![streckad linje](route_mnt2.png) cai_scale=EE
    * ![prickad linje](route_alp.png) cai_scale=EEA*
  uk: |-
    ## Storbritannien

    Klassificeringen av [långdistansleder i Storbritannien](https://wiki.openstreetmap.org/wiki/WikiProject_United_Kingdom_Long_Distance_Paths) (de som är taggade med `network=uk_ldp`) beror på `operator`-taggen. Relationer
    med `operator=National Trails` visas som nationella leder, alla andra relationer visas som regionala rutter.

    Relationer med en `network=lwn/rwn/nwn/iwn`-tagg hanteras som vanligt.
  czech: |-
    ## Tjeckien

    Landet använder en standard för ledmarkeringar baserad på en uppsättning av 7 symboler i 4 olika färger. För en beskrivning, se den [tjeckiska taggningssidan](https://wiki.openstreetmap.org/wiki/WikiProject_Czech_Republic/Editing_Standards_and_Conventions#Doporu.C4.8Den.C3.A9_typy_cest) (endast tjeckiska).

    När en `kct_*`-tagg är tillgänglig föredras den framför alla `osmc:symbol`-taggar.

    Dessutom omklassificeras rutten om ingen giltig nätverkstagg kan hittas. Rutter med `kct_red=major` blir nationella rutter, andra `kct_*=major` klassificeras som regionala.
  slovakia: |-
    ## Slovakien

    Slovakien använder samma standard för ledmarkering som Tjeckien. Taggningsschemat är dock något annorlunda, se
    [Slovakisk vandringssida](https://wiki.openstreetmap.org/wiki/WikiProject_Slovakia/Hiking_routes).

    Alla rutter med taggen `operator=KST` är taggade enligt det schemat. Eftersom rutter i Slovakien ska ha en giltig nätverkstagg utförs ingen omklassificering.
  hungary: |-
    ## Ungern

    Ungern använder också ett system med en fast uppsättning symboler i olika färger. Dessa är markerade med sin egen tagg [jel](https://wiki.openstreetmap.org/wiki/Key:jel).
    Taggen är att föredra framför alla `osmc:symbol`-taggar.
  germany: |-
    ## Tyskland

    ### Fränkischer Albverein

    Nätverket runt Nürnberg är ganska tätt, vilket innebär att regionala rutter taggade
    med `operator=Fränkischer Albverein` visas med lägre zoomnivåer än normalt.
  ukcycle: |-
    ## Storbritannien

    ### Norwich

    Norwich använder ett system med färgkodade rutter. Rutter taggade med
    `operator=Norwich City Council` är markerade med en färgad ruta enligt `färg`-taggen.
elevationprofiles:
  title: Höjdprofiler
  general: |-
    Höjdprofilerna är gjorda med höjddata från [ASTER global digital elevation model (GDEM) version 2](https://asterweb.jpl.nasa.gov/gdem.asp), taggen "ele" i OpenStreetMap tas inte med i beräkningen, inte heller tunnlar och broar. ASTER GDEM är en produkt från METI och NASA.

    Om rutten har fler än två slutpunkter eller består av mer än ett segment kommer ingen profil att renderas. Profilens riktning följer rutten väst-öst eller nord-syd. Om rutter hade element med roller som "start" och "mål", och/eller listades kontinuerligt från start till mål, skulle vi kanske kunna bestämma riktningen från själva ruttens relation. Du kanske vill ha dessa saker i åtanke om du kartlägger rutter på OpenStreetMap.

    Det finns hål, så kallade "tomrum" för vilka vi inte har några höjddata. Dessa visualiseras med hål i höjdprofillinjen.

    Var medveten om att även om ASTER version 2 förmodligen är den bästa gratis globala DEM:n, har den sina begränsningar både när det gäller noggrannhet och täckning. Se deras [valideringssammanfattningsrapport](https://www.jspacesystems.or.jp/ersdac/GDEM/ver2Validation/Summary_GDEM2_validation_report_final.pdf) för mer information. Felaktigheterna förvärras ytterligare av felaktigheten i OSM-data, [en utjämningsteknik](https://github.com/waymarkedtrails/waymarked-trails-site/commit/602e12f38bfdc50c7e07bd3f44e080d72bcbb2a2) som vi använder, och profilens upplösning som blir lägre ju längre rutten är.
technical:
  title: Tekniska detaljer
  general: |-
    Ruttöverlagringen uppdateras minutvis och ligger normalt 2–5 minuter efter OSM-servern. Datumet i det övre vänstra hörnet visar den senaste uppdateringen. Uppdateringar av den underliggande Mapnik-kartan ligger inte inom denna
    webbplats kontroll. Beroende på OSM-serverns aktuella belastning tar det
    mellan en minut och några timmar.

    Källkoden för denna webbplats är tillgänglig under en GPL-licens och
    uppdelad över flera arkiv:
    * [backend-kod och kartgenerering](https://github.com/waymarkedtrails/waymarkedtrails-backend/)
    * [API-tjänst](https://github.com/waymarkedtrails/waymarkedtrails-api/)
    * [webbplatsens frontend](https://github.com/waymarkedtrails/waymarkedtrails-website/)

    Om du bara vill rapportera ett fel eller diskutera webbplatsens funktioner,
    kan du använda [issue tracker](https://github.com/waymarkedtrails/waymarked-trails-site/issues)
    eller [diskussionen funktion](https://github.com/waymarkedtrails/waymarked-trails-site/discussions) i projektrepo på Github.
  translation: |-
    ## Översättningar

    Översättningar hanteras av de alltid hjälpsamma personerna på
    [translatewiki.net](https://translatewiki.net). Om du vill bidra med en översättning
    på ditt eget språk eller ge feedback på befintliga översättningar, besök
    [translatewiki.net projektsidan](https://translatewiki.net/wiki/Translating:Waymarked_Trails).
legal:
  title: Juridiska och användningsvilkor
  copyright: "Ruttöverlägget är tillgängligt under \n[Creative Commons Erkännande-Dela
    Lika 3.0 Tyskland-licensen](https://creativecommons.org/licenses/by-sa/3.0/de/deed.en),
    och GPX-spåren under \n[ODbL](https://opendatacommons.org/licenses/odbl/).\nDe
    får återanvändas och ändras så länge det resulterande verket använder en kompatibel
    licens\noch OpenStreetMap-projektet och denna webbplats nämns."
  usage: |-
    ## Användarpolicy

    Du får använda overlay på andra webbplatser så länge åtkomst trafikmängden är måttlig. Vänligen
    cacha rutor så ofta som möjligt och använd en korrekt hänvisning. Massnedladdning av rutor avråds starkt.

    GPX-spår tillhandahålls för att underlätta för besökare på denna webbplats. Massnedladdning är inte tillåten.
  disclaimer: |-
    ## Friskrivning

    Varken kartans korrekthet eller fullständighet kan garanteras. Om du ger dig ut på en
    vandring, skaffa en ordentlig papperskarta, lämplig utrustning och lämna inte ditt sunda förnuft hemma.
    Naturen kan vara lika hänsynslös som den är vacker.

    Denna webbplats innehåller länkar till externa webbplatser. Författaren till denna webbplats har inget inflytande på
    innehållet på dessa webbplatser och tar inget ansvar för det.
acknowledgements:
  title: Tack till
  text: |-
    All kartdata tillhandahålls av [OpenStreetMap och dess bidragsgivare](https://www.openstreetmap.org)
    och distribueras under licensen ODbL. Grundkartan används med tillstånd av OSM. För mer information, se [upphovsrättssidan för OSM](https://www.openstreetmap.org/copyright).

    OpenTopoMap-R-baskartan tillhandahålls vänligen av
    [openmaps.fr](https://openmaps.fr/about-openmaps.fr.html). Om du gillar den,
    överväg gärna att donera till underhållet av deras servrar. Besök
    [openmaps donationssida](https://openmaps.fr/donate)
    för mer information.

    Skuggningen för kullarna och höjddatan skapades från en kombination av data från SRTM och ASTER GDEM.
    ASTER GDEM är en produkt av METI och NASA.
    Efterbehandlingen tillhandahölls av Yves Cainaud från [opensnowmap.org](https://www.opensnowmap.org).

    Höjdprofilkoden har utvecklats av Espen Oldeman Lund i ett samarbete mellan [Kresendo](https://www.kresendo.no) och TG4NP-projektet på [Western Norway Research Institute](https://www.vestforsk.no).

    Varianten för vintersportsbackar har utvecklas av Michael Spreng. Ridningssymbolen förberedes av Robert Whittaker.

    Vägvisningsdestinationer processeras av [Mueschelsoft](http://osm.mueschelsoft.de/destinationsign/example/index.htm). Stort tack till Jan Michel för tillhandahålla tjänsten.

    Översättningarna av denna webbplats tillhandahålls av [translatewiki.net och dess bidragsgivare](https://translatewiki.net/wiki/Category:Waymarked_Trails_translators). Stort tack går till pionjäröversättarna som tillhandahöll översättningar innan translatewiki.net: Yves Cainaud (franska),
    Oscar Formaggi (italienska),
    Gustavo [Tuentibiker](https://www.blogger.com/profile/12473561703699888751) Ramis (spanska),
    [Guttorm Flatabø](https://guttormflatabo.com)/[TG4NP](http://tg4np.eu) (norsk bokmål och nynorska),
    Mads Lumholt/TG4NP (danska), Magnús Smári Snorrason/TG4NP (isländska),
    Lars Mikaelsson/TG4NP (svenska) och Elina Pesonen (finska).
