  text: |-
    Kaikki kartta-aineisto on saatu [OpenStreetMapista ja osallistujilta](http://www.openstreetmap.org)
    ja aineistoa levitetään ODbL-lisenssillä.
contact:
  title: Ota yhteyttä
  text: |-
    Kysymykset ja kommentit tähän sivuun liittyen voidaan lähettää osoitteeseen: [lonvia@denofr.de](mailto:lonvia@denofr.de).

    Bugeista voi myös raportoida [the project's issue tracker on github](https://github.com/waymarkedtrails/waymarked-trails-site/issues). Ennen bugeista raportointia, varmista että ongelmasi ei ole OSM-datassa.
